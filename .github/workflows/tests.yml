name: "Tests"

on:
  push:
    branches:
      - '**'
      - '!dependabot/**'
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/NzbWebDAV.Tests/NzbWebDAV.Tests.csproj

      - name: Test
        run: dotnet test tests/NzbWebDAV.Tests/NzbWebDAV.Tests.csproj --no-restore
